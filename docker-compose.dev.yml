services:
  rd-dev:
    build:
      context: ./RD
      dockerfile: Dockerfile
    environment:
      RD_ALLOWED_ORIGINS: http://127.0.0.1:4321,http://localhost:4321
      RD_SESSION_SECRET: change-this-to-a-strong-secret
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 3000 --reload
    volumes:
      - ./RD:/app
    ports:
      - "3000:3000"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:3000/api/auth/status', timeout=5).getcode()==200 else 1)" ]
      interval: 15s
      timeout: 8s
      retries: 5
      start_period: 20s

  fe-dev:
    image: node:22-bookworm-slim
    working_dir: /app
    environment:
      RD_BACKEND_BASE_URL: http://rd-dev:3000
      PUBLIC_RD_BACKEND_BASE_URL: http://rd-dev:3000
      PUBLIC_AUTH_STATE_STORAGE_KEY: LINGZHEN_AUTH_LOGGED_IN
      PUBLIC_AUTH_USERNAME_STORAGE_KEY: LINGZHEN_AUTH_USERNAME
      PUBLIC_AUTH_DEFAULT_LOGGED_IN: "false"
      PNPM_REGISTRY: ${PNPM_REGISTRY:-https://registry.npmmirror.com}
    command: sh -c "corepack enable && pnpm config set registry $PNPM_REGISTRY && pnpm config set fetch-retries 8 && pnpm config set fetch-retry-mintimeout 10000 && pnpm config set fetch-retry-maxtimeout 120000 && pnpm config set fetch-timeout 120000 && pnpm install --prefer-offline && pnpm dev --host 0.0.0.0 --port 4321"
    depends_on:
      rd-dev:
        condition: service_healthy
    volumes:
      - ./FE:/app
      - tg-fe-node-modules:/app/node_modules
    ports:
      - "4321:4321"
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:4321').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))" ]
      interval: 15s
      timeout: 8s
      retries: 5
      start_period: 20s

volumes:
  tg-fe-node-modules:
